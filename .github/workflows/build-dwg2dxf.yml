name: Build dwg2dxf Binary

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/build-dwg2dxf.yml'

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential autoconf automake libtool pkg-config wget xz-utils perl

      - name: Build LibreDWG dwg2dxf
        run: |
          wget -q https://github.com/LibreDWG/libredwg/releases/download/0.12.5/libredwg-0.12.5.tar.xz
          tar xf libredwg-0.12.5.tar.xz
          cd libredwg-0.12.5
          ./configure --without-perl --without-python --disable-shared
          make -j$(nproc)
          cp programs/dwg2dxf ../bin/dwg2dxf
          strip ../bin/dwg2dxf
          echo "Built: $(file ../bin/dwg2dxf)"
          echo "Version: $(../bin/dwg2dxf --version 2>&1 | head -2)"

      - name: Commit binary to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bin/dwg2dxf
          git commit -m "ci: update dwg2dxf binary (LibreDWG 0.12.5, ubuntu-22.04)" || echo "No changes"
          git push
