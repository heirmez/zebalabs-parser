name: Build & Push ODA Image

on:
  push:
    paths:
      - 'oda-service/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build image
        run: |
          docker build -t ghcr.io/${{ github.repository }}/oda-converter:latest ./oda-service

      - name: Push image
        run: |
          docker push ghcr.io/${{ github.repository }}/oda-converter:latest
